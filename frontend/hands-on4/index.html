<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Portal | Digital Nurture 5.0</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>

  <header>
    <div class="site-name">Student Portal</div>
    <nav>
      <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#courses">Courses</a></li>
        <li><a href="#notifications">Notifications</a></li>
        <li><a href="#profile">Profile</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="hero">
      <h1>Welcome to the Student Portal</h1>
      <p>Track your courses, grades, and notifications all in one place.</p>
    </section>

    <section id="courses">
      <h2>Enrolled Courses</h2>
      <p id="courses-loading"></p>
      <div class="course-grid"></div>
      <p id="total-credits"></p>
    </section>

    <section id="notifications">
      <h2>Notifications</h2>
      <div class="notification-controls">
        <button id="load-notifications">Load Notifications</button>
        <button id="simulate-error">Simulate Error</button>
      </div>
      <p id="notifications-spinner" class="spinner">Loading...</p>
      <div id="notifications-list"></div>
      <div id="notifications-error"></div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Student Portal. All rights reserved.</p>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
